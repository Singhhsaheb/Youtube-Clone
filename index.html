<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">

        <div class="logo">
            YouTube
        </div>

        <div class="search">
            <input type="text" placeholder="Search">
            <button>Search</button>
        </div>

    </div>

    <!-- Sidebar -->
     -
     <!-- Sidebar -->
    <div class="sidebar">

        <ul>
            <li>Home</li>
            <li>Shorts</li>
            <li>Subscriptions</li>
            <li>Library</li>
            <li>History</li>
        </ul>

    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="video-card">

            <img src="https://picsum.photos/250/150?1" alt="video">

            <div class="video-info">
                <h3>HTML Tutorial</h3>
                <p>Singhh_saheb</p>
                <p>1M views • 2 days ago</p>
            </div>

        </div>

        <div class="video-card">

            <img src="https://picsum.photos/250/150?2" alt="video">

            <div class="video-info">
                <h3>CSS Tutorial</h3>
                <p>Apna College</p>
                <p>500K views • 1 week ago</p>
            </div>

        </div>

        <div class="video-card">

            <img src="https://picsum.photos/250/150?3" alt="video">

            <div class="video-info">
                <h3>JavaScript Basics</h3>
                <p>Tech Gun</p>
                <p>800K views • 5 days ago</p>
            </div>

        </div>

    </div>

</body>

</html>
